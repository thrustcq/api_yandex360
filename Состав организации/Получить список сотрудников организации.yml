info:
  name: Получить список сотрудников организации
  type: http
  seq: 1

http:
  method: GET
  url: "{{cloud_url}}/v1/directory/organizations/{{orgId}}/users"
  headers:
    - name: Authorization
      value: OAuth {{oauth_token}}
  params:
    - name: email
      value: email@example.com
      type: query
      disabled: true
    - name: limit
      value: "4"
      type: query
      disabled: true
    - name: offset
      value: "14"
      type: query
      disabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
