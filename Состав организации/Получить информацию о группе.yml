info:
  name: Получить информацию о группе
  type: http
  seq: 3

http:
  method: GET
  url: "{{cloud_url}}/v1/directory/organizations/{{orgId}}/groups/{{group_id}}"
  headers:
    - name: Authorization
      value: OAuth {{oauth_token}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
