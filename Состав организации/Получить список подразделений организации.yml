info:
  name: Получить список подразделений организации
  type: http
  seq: 5

http:
  method: GET
  url: "{{cloud_url}}/v1/directory/organizations/{{orgId}}/departments"
  headers:
    - name: Authorization
      value: OAuth {{oauth_token}}
  params:
    - name: email
      value: email@example.com
      type: query
      disabled: true
    - name: limit
      value: "6"
      type: query
      disabled: true
    - name: offset
      value: "2"
      type: query
      disabled: true
    - name: is_2fa_enabled
      value: "false"
      type: query
      disabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
