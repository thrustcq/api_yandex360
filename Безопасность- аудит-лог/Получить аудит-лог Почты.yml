info:
  name: Получить аудит-лог Почты
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/security/v1/org/{{orgId}}/audit_log/mail?pageSize=10&afterDate=2026-04-11T02:00:00Z&beforeDate=2026-04-13T23:04:00Z&types=mailbox_send"
  params:
    - name: pageSize
      value: "10"
      type: query
    - name: afterDate
      value: 2026-04-11T02:00:00Z
      type: query
    - name: beforeDate
      value: 2026-04-13T23:04:00Z
      type: query
    - name: excludeUids
      value: ""
      type: query
      disabled: true
    - name: includeUids
      value: "1234567890123456"
      type: query
      disabled: true
    - name: pageToken
      value: ""
      type: query
      disabled: true
    - name: types
      value: mailbox_send
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
