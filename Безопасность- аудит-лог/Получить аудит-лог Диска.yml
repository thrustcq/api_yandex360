info:
  name: Получить аудит-лог Диска
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/security/v1/org/{{orgId}}/audit_log/disk?pageSize=10&afterDate=2022-04-10T12:00:00Z&beforeDate=2026-04-13T16:15:00Z"
  params:
    - name: pageSize
      value: "10"
      type: query
    - name: afterDate
      value: 2022-04-10T12:00:00Z
      type: query
    - name: beforeDate
      value: 2026-04-13T16:15:00Z
      type: query
    - name: excludeUids
      value: ""
      type: query
      disabled: true
    - name: includeUids
      value: "1234567890123456"
      type: query
      disabled: true
    - name: pageToken
      value: ""
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
