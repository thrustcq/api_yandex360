info:
  name: Добавить домен
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/directory/v1/org/{{orgId}}/domains"
  body:
    type: json
    data: |-
      {
        "domain": "example.com" // Полное имя домена
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
