    <h2>Безопасность: двухфакторная аутентификация (v1)</h2>

    <p>Сервис для включения/отключения обязательной двухфакторной аутентификации (2FA) в организации.</p>
    <p>С помощью методов, описанных в этом разделе, вы можете включить или отключить двухфакторную аутентификацию сразу всем пользователям с аккаунтами на домене организации. Методы, которые позволяют управлять персональной 2FA, описаны в разделе <a href="https://yandex.ru/dev/api360/doc/ru/ref/Domain2FAV2Service/">Двухфакторная аутентификация с возможностью персональной настройки (v2)</a> и доступны не на всех тарифах.</p>
    <p>Права доступа, необходимые приложению для работы с двухфакторной аутентификацией:</p>
    <ul>
    <li><code class="yfm-clipboard-inline-code" role="button" aria-label="Блок кода" aria-description="Чтобы скопировать текст внутри блока нажмите на блок" tabindex='0' id="inline-code-id-amrke4b3">ya360_security:domain_2fa_write</code> — управление обязательной двухфакторной аутентификацией для пользователей.</li>
    </ul>

    <a href="https://yandex.ru/dev/api360/doc/ru/ref/Domain2FAService/">Перейти в Справочник</a>
  type: text/markdown
