info:
  name: Поиск правил маршрутизации
  type: http
  seq: 1

http:
  method: POST
  url: "{{cloud_url}}/v1/mail/organizations/{{orgId}}/routes/search"
  headers:
    - name: Authorization
      value: OAuth {{oauth_token}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
