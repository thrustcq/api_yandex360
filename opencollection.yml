opencollection: 1.0.0

info:
  name: Yandex 360
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: bearer
    token: "{{oauth_token}}"

docs:
  content: |-
    # Привет! 👋

    Добро пожаловать в коллекцию запросов к **API Яндекс 360 для бизнеса**!

    Здесь собраны все доступные на данный момент методы для взаимодействия с сервисами организации

    ---

    ## ✨ Что вас ждёт
    <table>
    <tr><td>✅</td><td>Каждый запрос в этой коллекции уже подготовлен и готов к использованию</td></tr>
    <tr><td>🔧</td><td>Нужно лишь добавить требуемые переменные и настроить окружение</td></tr>
    <tr><td>📚</td><td>Внутри каждого раздела — отдельное описание</td></tr>
    <tr><td>🧹</td><td>В самих запросах — небольшие ремарки</td></tr>
    </table>

    ---

    ## 🔐 Требования к доступу

    Перед началом работы убедитесь, что ваше <a href="https://oauth.yandex.ru/">OAuth-приложение</a> имеет **необходимые разрешения**. Для каждой группы запросов они указаны отдельно — обратите внимание на описание внутри разделов

    ---

    ## 💡 Совет

    Начинайте с запросов на **чтение** — они безопасны и помогут убедиться, что токен работает корректно

    ---

    **Приятной работы!** 🚀

    ---

    *Яндекс 360 API · Bruno коллекция*
  type: text/markdown
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
