info:
  name: Изменить адреса электронной почты
  type: http
  seq: 6

http:
  method: PUT
  url: "{{base_url}}/directory/v1/org/{{orgId}}/external_contacts/{{contactId}}/emails"
  body:
    type: json
    data: |-
      {
        "emails": [ // Массив электронных адресов
          {
            "email": "email@example.com", // Электронный адрес
      //      "type": "example", // Тип электронного адреса
            "main": true // Признак основного электронного адреса
          },
          {
            "email": "email@example.com",
      //      "type": "example",
            "main": false
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
