  content: |-
    <h2>Безопасность: настройки авторизации</h2>

    <p>Сервис для управления временем жизни cookie сессий пользователей. Позволяет выйти из аккаунта пользователя на всех устройствах.</p>
    <p>Разрешения на использование сервиса, которые доступны при настройке приложения:</p>
    <ul>
    <li><code class="yfm-clipboard-inline-code" role="button" aria-label="Блок кода" aria-description="Чтобы скопировать текст внутри блока нажмите на блок" tabindex='0' id="inline-code-id-uthgn8co">ya360_security:domain_sessions_read</code> — чтение информации о времени жизни cookie сессий пользователей;</li>
    <li><code class="yfm-clipboard-inline-code" role="button" aria-label="Блок кода" aria-description="Чтобы скопировать текст внутри блока нажмите на блок" tabindex='0' id="inline-code-id-vdl76poq">ya360_security:domain_sessions_write</code> — управление временем жизни cookie сессий пользователей и авторизацией.</li>
    </ul>

    <a href="https://yandex.ru/dev/api360/doc/ru/ref/DomainSessionsService/">Перейти в Справочник</a>
  type: text/markdown
