  content: |-
    <h2>Разрешенные и запрещенные отправители</h2>

    <p>Сервис для настройки на уровне домена списка разрешенных и запрещенных адресов отправителей для входящей почты.
    Список формируется при помощи Правил доменной политики. Правила доменной политики имеют приоритет выше, чем настройки Спамообороны Почты.</p>
    <p>Права доступа, необходимые приложению для работы с правилами:</p>
    <ul>
    <li><code class="yfm-clipboard-inline-code" role="button" aria-label="Блок кода" aria-description="Чтобы скопировать текст внутри блока нажмите на блок" tabindex='0' id="inline-code-id-hnokqtqj">ya360_admin:mail_write_routing_rules</code> — просмотр и изменение;</li>
    <li><code class="yfm-clipboard-inline-code" role="button" aria-label="Блок кода" aria-description="Чтобы скопировать текст внутри блока нажмите на блок" tabindex='0' id="inline-code-id-m4j2yhum">ya360_admin:mail_read_routing_rules</code> — просмотр.</li>
    </ul>
    <h4 id="terminy"><a href="ru/ref/DomainPolicies/#terminy" class="yfm-anchor yfm-clipboard-anchor" aria-hidden="true"></a>Термины</h4>
    <p><strong>Правило</strong> доменной политики — инструкция, которая описывает, какое <em><strong>Действие</strong></em> нужно выполнить с письмом при выполнении <em><strong>Условия</strong></em>.
    Каждому правилу вы можете давать название и краткое описание того, для чего оно предназначено.</p>
    <p><strong>Действие</strong> — операция над письмом.</p>
    <p>Письмо можно:</p>
    <ul>
    <li>отклонить — не доставлять в ящик получателя вне зависимости от результата проверки Спамообороной;</li>
    <li>принять с отметкой спама — поместить в папку «Спам» почтового ящика получателя;</li>
    <li>принять — доставить получателю, даже если Спамооборона Почты распознала письмо как спам.</li>
    </ul>
    <p><strong>Условие</strong> — алгоритм проверки отправителя письма на соответствие заданным параметрам.
    Для одного условия проверку запрещенных или разрешенных отправителей можно задавать через указание одного из списков:</p>
    <ul>
    <li>полных электронных адресов;</li>
    <li>доменов;</li>
    <li>IP-адресов и масок подсетей.</li>
    </ul>
    <p>Максимальное количество элементов в одном списке — 200.</p>
    <h4 id="osobennosti-raboty-so-spiskom-pravil"><a href="ru/ref/DomainPolicies/#osobennosti-raboty-so-spiskom-pravil" class="yfm-anchor yfm-clipboard-anchor" aria-hidden="true"></a>Особенности работы со списком правил</h4>
    <ul>
    <li>Обновить список правил можно только целиком. Если вы хотите добавить какое-то правило, сначала выгрузите существующий список правил и обновите его, а затем загрузите весь список заново.</li>
    <li>Порядок правил в списке имеет значение — чем выше правило к началу списка, тем выше его приоритет. То есть для каждого входящего письма условия проверяются по порядку, начиная с первого правила. Если для отправителя проверка очередного условия успешна, к письму применяется текущее правило, а дальнейшая проверка прекращается.</li>
    <li>Для каждого правила в списке указывается признак активности: для того, чтобы отключить правило его не обязательно удалять из списка, достаточно просто установить признаку активности значение <code class="yfm-clipboard-inline-code" role="button" aria-label="Блок кода" aria-description="Чтобы скопировать текст внутри блока нажмите на блок" tabindex='0' id="inline-code-id-b892udgm">false</code>.</li>
    <li>Правила доменной политики распространяются только на сотрудников с аккаунтами на домене организации. На остальных пользователей, например владельца организации с почтой вида <code class="yfm-clipboard-inline-code" role="button" aria-label="Блок кода" aria-description="Чтобы скопировать текст внутри блока нажмите на блок" tabindex='0' id="inline-code-id-gjmogf3e">login@yandex.ru</code> или приглашенных пользователей с аккаунтами на Яндексе, правила не действуют.</li>
    <li>Максимальное количество правил доменной политики в списке — 200.</li>
    </ul>

    <a href="https://yandex.ru/dev/api360/doc/ru/ref/DomainPolicies/">Перейти в Справочник</a>
