info:
  name: Получить DNS-записи домена
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/directory/v1/org/{{orgId}}/domains/{{domain}}/dns"
  params:
    - name: page
      value: "2"
      type: query
      disabled: true
    - name: perPage
      value: "3"
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
