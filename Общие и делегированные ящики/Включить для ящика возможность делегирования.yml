info:
  name: Включить для ящика возможность делегирования
  type: http
  seq: 3

http:
  method: PUT
  url: "{{base_url}}/admin/v1/org/{{orgId}}/mailboxes/delegated"
  body:
    type: json
    data: |-
      {
        "resourceId": "1234567890123456" // Идентификатор почтового ящика
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
