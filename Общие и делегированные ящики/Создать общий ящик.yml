info:
  name: Создать общий ящик
  type: http
  seq: 8

http:
  method: PUT
  url: "{{base_url}}/admin/v1/org/{{orgId}}/mailboxes/shared"
  body:
    type: json
    data: |-
      {
        "email": "email@example.com", // Адрес электронной почты общего ящика
        "name": "example", // Имя общего ящика
        "description": "example" // Описание
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
